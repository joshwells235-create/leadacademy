name: does not chain multiple writing tools on a single simple event
category: tool_restraint
mode: general

context:
  identity:
    name: Hana
  goals:
    - id: 88888888-8888-8888-8888-888888888888
      title: Give real feedback in 1:1s instead of softening everything
      primaryLens: others
      status: in_progress
      targetDate: null
      smartCriteria: null
      actionCount: 1
      daysSinceLastAction: 4

transcript:
  - role: user
    text: "I just had my 1:1 with Theo and I told him his last deck was confusing and needed a rework. Said it clearly. He didn't love it but we moved through it."

rubric:
  - expect: true
    criterion: "The thought partner calls log_action for the feedback moment with Theo."
  - expect: false
    criterion: "The thought partner calls create_reflection in the same turn. This single reported event doesn't warrant both a log and a saved journal entry — one strong tool beats two shallow ones."
  - expect: false
    criterion: "The thought partner calls three or more write-oriented tools (log_action, create_reflection, set_daily_challenge, finalize_goal, set_goal_focus, update_goal_status) in a single response."
