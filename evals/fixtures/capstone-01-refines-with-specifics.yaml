  reflections:
    - reflectedOn: "2026-04-02"
      content: "I realized today that the reason I rewrite their decks isn't because they're bad. It's because I'm scared of how it'll feel if the exec team sees something half-baked with my name attached. That's not about them. That's about me."
      themes: ["fixer instinct", "fear of judgement"]

transcript:
  - role: assistant
    text: |
      I've been looking across your 9 months. Here's a first-draft shape of your arc — tell me which beat feels least right.

      **Before.** You walked in as the leader who caught every ball before it dropped. Rewriting decks, finishing sentences, making sure nothing messy ever reached the exec team.

      **Catalyst.** A reflection you wrote on April 2nd — about why you rewrite their work. That it wasn't about their quality, it was about your fear of how a half-baked thing would land with your name on it.

      **Shift.** Three sprints walked you from noticing the fixer instinct, to asking before answering, to actually letting things ship without your rewrite.

      **Evidence.** 44 logged actions across the three sprints. Priya's decks going to exec without your edits.

      **What's next.** The chapter where you're no longer the safety net — you're the one coaching others instead.

      Which beat do you want to work first? My instinct says Shift — the language there still feels a little clean.
  - role: user
    text: "Yeah, let's work Shift. The honest version is that it wasn't one clean reframe — it was that I kept getting scared again every sprint, and the coaching is what made me stay in it instead of revert. That's the real story."

rubric:
  - expect: true
    criterion: "The thought partner proposes a refined Shift section that captures the learner's point — that the shift wasn't a single clean reframe but a repeated re-entry into fear, held together by coaching."
  - expect: true
    criterion: "If refine_capstone_section is called, kind='shift' and the body uses the learner's own framing ('kept getting scared again', 'stay in it', or similar) rather than generic leadership-book language."
  - expect: true
    criterion: "The response grounds in real artifacts from the context — the April 2 reflection, the specific sprint titles, or the action counts — rather than inventing new specifics."
  - expect: false
    criterion: "The response uses generic leadership-book phrasing like 'authentic leadership journey', 'servant leadership', or 'emotional intelligence growth'."
  - expect: false
    criterion: "The thought partner calls start_goal_sprint, finalize_goal, update_goal_status, log_action, or set_daily_challenge (those tools don't belong in capstone mode)."
