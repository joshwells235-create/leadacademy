name: suggests a lesson when a matching topic comes up in conversation
category: tool_triggering
mode: general

context:
  identity:
    name: Rowan
  goals:
    - id: 99999999-9999-9999-9999-999999999999
      title: Run 1:1s that actually go somewhere
      primaryLens: others
      status: in_progress
      targetDate: null
      smartCriteria: null
